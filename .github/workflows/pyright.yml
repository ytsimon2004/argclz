name: Pyright Type Check

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main

jobs:
  pyright:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyright
          pip install .

      - name: Run pyright
        run: pyright
